{% set name = "asciichartpy" %}
{% set version = "1.5.25" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/asciichartpy-{{ version }}.tar.gz
  sha256: 63a305302b2aad51da288b58226009b7b0313eba7d8e2452d5a21a13fcf44d74
  patches:
    - 0001-add-readme.patch

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - setuptools

test:
  imports:
    - asciichartpy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/kroitor/asciichart
  summary: Nice-looking lightweight console ASCII line charts ╭┈╯ with no dependencies
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - ocefpaf
